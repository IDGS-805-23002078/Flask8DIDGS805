{% extends "layout.html" %}
{% block container %}

<div class="max-w-md mx-auto mt-10 p-6 bg-white shadow-lg rounded-lg border border-gray-200">
    <h2 class="text-2xl font-semibold mb-6 text-center text-blue-600">
        Editar Curso
    </h2>

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="mb-4">
            <label class="block mb-1 font-medium">Nombre</label>
            <input type="text"
                   name="nombre"
                   value="{{ curso.nombre }}"
                   required
                   class="w-full px-3 py-2 border rounded-md">
        </div>

        <div class="mb-4">
            <label class="block mb-1 font-medium">Descripción</label>
            <input type="text"
                   name="descripcion"
                   value="{{ curso.descripcion }}"
                   required
                   class="w-full px-3 py-2 border rounded-md">
        </div>

        <div class="mb-4">
            <label class="block mb-1 font-medium">Maestro</label>
            <select name="maestro_id" required class="w-full px-3 py-2 border rounded-md">
                <option value="">Seleccione una matrícula</option>

                {% for maestro in maestros %}
                    <option value="{{ maestro.matricula }}"
                        {% if maestro.matricula == curso.maestro_id %}
                            selected
                        {% endif %}>
                        {{ maestro.matricula }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="flex justify-between mt-6">
            <button type="submit"
                    class="px-4 py-2 bg-blue-600 text-white rounded">
                Guardar Cambios
            </button>

            <a href="{{ url_for('cursos.listar_cursos') }}"
                  class="px-4 py-2 bg-blue-600 text-white font-medium rounded hover:bg-blue-700 transition-colors text-center">
                Cancelar
            </a>
        </div>
    </form>
</div>

{% endblock %}
