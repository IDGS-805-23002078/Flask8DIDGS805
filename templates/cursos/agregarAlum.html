{% extends "layout.html" %}
{% block container %}

<div class="max-w-md mx-auto mt-10 p-6 bg-white shadow-lg rounded-lg border border-gray-200">

    <h2 class="text-2xl font-semibold mb-6 text-center text-blue-600">
        Inscribir alumno al curso
    </h2>

    <div class="mb-4">
        <label class="block mb-1 font-medium">Curso</label>
        <input type="text"
               value="{{ curso.nombre }}"
               class="w-full px-3 py-2 border rounded-md bg-gray-100"
               readonly>
    </div>

    <form method="POST" class="space-y-4">

        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div>
            <label class="block mb-1 font-medium">Selecciona un alumno</label>

            <select name="alumno_id"
                    class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">-- Seleccionar --</option>

                {% for alumno in alumnos %}
                    <option value="{{ alumno.id }}">
                        {{ alumno.nombre }} {{ alumno.apaterno }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="flex justify-between mt-6">

            <button type="submit"
                class="px-4 py-2 bg-blue-600 text-white font-medium rounded hover:bg-blue-700 transition-colors">
                Inscribir
            </button>

            <a href="{{ url_for('cursos.listar_cursos') }}"
                  class="px-4 py-2 bg-blue-600 text-white font-medium rounded hover:bg-blue-700 transition-colors text-center">

               Cancelar
            </a>

        </div>

    </form>
</div>

{% endblock %}
